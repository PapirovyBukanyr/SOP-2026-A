name: Build LaTeX PDF ukol_2

on:
  workflow_dispatch: {}       
  push:
    paths:
      - 'ukol_2/**'            
  pull_request:
    types: [opened, synchronize, reopened]  
    paths:
      - 'ukol_2/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Compile with LuaLaTeX
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: ukol_2
          root_file: sablona-main.tex
          compiler: lualatex

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: ukol_2_pdf
          path: ukol_2/sablona-main.pdf

      - name: Commit generated PDF and open PR
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="ci/add-pdf-${GITHUB_RUN_ID}"
          git checkout -b "$BRANCH"
          git add ukol_2/sablona-main.pdf
          git commit -m "Add generated PDF from CI [skip ci]" || { echo "No changes to commit"; exit 0; }
          git push --set-upstream origin "$BRANCH"
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pulls" \
            -d "{\"title\":\"Add generated PDF from CI\",\"head\":\"${BRANCH}\",\"base\":\"main\",\"body\":\"Automated PDF generated by CI\"}" \
            | jq -r '.html_url // "PR creation response received"'
