name: Build LaTeX PDF (LuaLaTeX)

on:
  push:
    branches: [ main ]
    paths:
      - 'ukol_2/**'
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Compile with LuaLaTeX
        uses: xu-cheng/latex-action@<commit-sha-for-v2> # v2
        with:
          root_file: ukol_2/sablona-main.tex
          compiler: lualatex

      - name: Upload PDF
        uses: actions/upload-artifact@v3
        with:
          name: ukol_2_pdf
          path: ukol_2/sablona-main.pdf
