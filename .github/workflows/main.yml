name: Build LaTeX PDF ukol_2

permissions:
  contents: write

on:
  push:
    paths:
      - 'ukol_2/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile with LuaLaTeX
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: ukol_2
          root_file: sablona-main.tex
          compiler: lualatex

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: ukol_2_pdf
          path: ukol_2/sablona-main.pdf

      - name: Commit and push updated PDF (feature branches only)
        if: github.event_name == 'push' && github.ref != 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "Update generated PDF [skip ci]" || echo "Nothing to commit."
          git push
