name: Build LaTeX PDF ukol_2

permissions:
  contents: write
  pull-requests: write

on:
  workflow_dispatch: {}
  push:
    paths:
      - 'ukol_2/**'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'ukol_2/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Compile with LuaLaTeX
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: ukol_2
          root_file: sablona-main.tex
          compiler: lualatex

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: ukol_2_pdf
          path: ukol_2/sablona-main.pdf

  create_pr:
    needs: build
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.create_pr.outputs.pr_number }}
      branch: ${{ steps.create_pr.outputs.branch }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Download generated PDF
        uses: actions/download-artifact@v4
        with:
          name: ukol_2_pdf

      - name: Create branch, commit PDF, push and open PR
        id: create_pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          apt-get update -qq
          apt-get install -y -qq jq

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          BRANCH="ci/add-pdf-${GITHUB_RUN_ID}"
          echo "Creating branch $BRANCH"
          git checkout -b "$BRANCH"

          # The downloaded artifact preserves the path ukol_2/sablona-main.pdf
          git add ukol_2/sablona-main.pdf || true

          # Try commit; if no changes, exit gracefully and expose outputs (empty pr_number)
          if git commit -m "Add generated PDF from CI [skip ci]"; then
            git push --set-upstream origin "$BRANCH"

            # create PR and capture JSON response
            PR_JSON=$(curl -s -X POST \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/pulls" \
              -d "{\"title\":\"Add generated PDF from CI\",\"head\":\"${BRANCH}\",\"base\":\"main\",\"body\":\"Automated PDF generated by CI\"}")

            PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number // empty')
            PR_URL=$(echo "$PR_JSON" | jq -r '.html_url // empty')

            if [ -z "$PR_NUMBER" ]; then
              echo "Failed to create PR. Response: $PR_JSON"
              echo "branch=$BRANCH" >> $GITHUB_OUTPUT
              echo "pr_number=" >> $GITHUB_OUTPUT
              exit 1
            fi

            echo "PR created: #$PR_NUMBER -> $PR_URL"

            # export outputs for job
            echo "branch=$BRANCH" >> $GITHUB_OUTPUT
            echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          else
            echo "No changes to commit; skipping PR creation."
            # still expose branch (for info) and empty pr_number
            echo "branch=$BRANCH" >> $GITHUB_OUTPUT
            echo "pr_number=" >> $GITHUB_OUTPUT
            exit 0
          fi

  approve_and_merge:
    needs: create_pr
    runs-on: ubuntu-latest
    if: ${{ needs.create_pr.outputs.pr_number != '' }}
    steps:
      - name: Install jq
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq

      - name: Approve PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.create_pr.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          echo "Approving PR #$PR_NUMBER..."
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/pulls/${PR_NUMBER}/reviews" \
            -d '{"event":"APPROVE"}' | jq -r '.id // "approval response received"'

      - name: Merge PR
        id: merge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.create_pr.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          echo "Merging PR #$PR_NUMBER..."
          MERGE_RESP=$(curl -s -X PUT \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/pulls/${PR_NUMBER}/merge" \
            -d "{\"commit_title\":\"Merge generated PDF\",\"merge_method\":\"squash\"}")
          echo "Merge response: $MERGE_RESP"
          echo "$MERGE_RESP" > merge_response.json
          MERGED=$(echo "$MERGE_RESP" | jq -r '.merged // false')
          if [ "$MERGED" != "true" ]; then
            echo "Merge failed or PR not mergeable."
            exit 1
          fi

      - name: Delete branch on remote
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ needs.create_pr.outputs.branch }}
          REPO: ${{ github.repository }}
        run: |
          if [ -n "$BRANCH" ]; then
            echo "Deleting remote branch: $BRANCH"
            API_DEL_RESP=$(curl -s -X DELETE \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/git/refs/heads/${BRANCH}")
            echo "API delete response: $API_DEL_RESP"
          else
            echo "No branch name available; skipping delete."
          fi
