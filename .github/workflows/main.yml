name: Build LaTeX PDF ukol_2

on:
  push:
    branches: [ main ]
    paths:
      - 'ukol_2/**'
  pull_request:
    paths:
      - 'ukol_2/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Compile with LuaLaTeX
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: ukol_2
          root_file: sablona-main.tex
          compiler: lualatex

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: ukol_2_pdf
          path: ukol_2/sablona-main.pdf

      - name: Commit generated PDF back to branch
        if: ${{ github.event_name != 'pull_request' || github.actor == 'github-actions[bot]' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ukol_2/sablona-main.pdf
          git commit -m "Add generated PDF from CI [skip ci]" || echo "No changes to commit"
          git push
