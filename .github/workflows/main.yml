name: Build LaTeX PDF

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v2
        with:
          root_file: ukol_2/sablona-main.tex

      - name: Upload PDF
        uses: actions/upload-artifact@v3
        with:
          name: pdf
          path: main.pdf
